<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="description" content="Beautiful animated flip clock showing current time">
    <link rel="icon" type="image/x-icon" href="/icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <title>Flip Watch</title>
</head>
<body style="opacity: 0; transition: opacity 0.5s ease-in;">
<div class="clock_face">
    <div id="hours" class="pair-cards">
        <div id="h-o" class="flip-card">
            <div class="back card">
                <span class="v"></span>
            </div>
            <div class="up card front">
                <span class="v"></span>
            </div>
            <div class="low card front">
                <span class="v"></span>
            </div>
        </div>
        <div id="o-h" class="flip-card">
            <div class="back card">
                <span class="v"></span>
            </div>
            <div class="up card front">
                <span class="v"></span>
            </div>
            <div class="low card front">
                <span class="v"></span>
            </div>
        </div>
    </div>
    <div class="delim">
        <div></div>
        <div></div>
    </div>
    <div id="minutes" class="pair-cards">
        <div id="m-o" class="flip-card">
            <div class="back card">
                <span class="v"></span>
            </div>
            <div class="up card front">
                <span class="v"></span>
            </div>
            <div class="low card front">
                <span class="v"></span>
            </div>
        </div>
        <div id="o-m" class="flip-card">
            <div class="back card">
                <span class="v"></span>
            </div>
            <div class="up card front">
                <span class="v"></span>
            </div>
            <div class="low card front">
                <span class="v"></span>
            </div>
        </div>
    </div>
    <div class="delim">
        <div></div>
        <div></div>
    </div>
    <div id="seconds" class="pair-cards">
        <div id="s-o" class="flip-card">
            <div class="back card">
                <span class="v"></span>
            </div>
            <div class="up card front">
                <span class="v"></span>
            </div>
            <div class="low card front">
                <span class="v"></span>
            </div>
        </div>
        <div id="o-s" class="flip-card">
            <div class="back card">
                <span class="v"></span>
            </div>
            <div class="up card front">
                <span class="v"></span>
            </div>
            <div class="low card front">
                <span class="v"></span>
            </div>
        </div>
    </div>
</div>
<script src="/app.js"></script>
</body>
</html>
